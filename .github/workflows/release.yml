name: Release

on:
  push:
    tags:
      - 'v*'

permissions: {}

env:
  CARGO_TERM_COLOR: always

jobs:
  verify-version:
    name: Verify Version Match
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Check Cargo.toml version matches tag
        run: |
          CARGO_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*= *"\(.*\)"/\1/')
          TAG_VERSION=${GITHUB_REF_NAME#v}
          echo "Cargo.toml version : $CARGO_VERSION"
          echo "Git tag version     : $TAG_VERSION"
          if [ "$CARGO_VERSION" != "$TAG_VERSION" ]; then
            echo ""
            echo "❌ Version mismatch!"
            echo "   Cargo.toml says $CARGO_VERSION but the tag is v$TAG_VERSION."
            echo "   Bump the version in Cargo.toml before tagging, or use 'cargo release'."
            exit 1
          fi
          echo "✅ Versions match — good to go."

  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: verify-version
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      
      - name: Generate changelog
        id: changelog
        run: |
          # Get the latest two tags
          CURRENT_TAG=${GITHUB_REF#refs/tags/}
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          
          # Generate changelog
          if [ -n "$PREVIOUS_TAG" ]; then
            CHANGELOG=$(git log --pretty=format:"- %s" $PREVIOUS_TAG..HEAD | head -20)
          else
            CHANGELOG=$(git log --pretty=format:"- %s" HEAD | head -20)
          fi
          
          # Create multiline output
          {
            echo "changelog<<EOF"
            echo "## What's Changed"
            echo ""
            echo "$CHANGELOG"
            echo ""
            echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREVIOUS_TAG}...${CURRENT_TAG}"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.changelog }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-and-upload:
    name: Build and Upload (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive-name: xv-windows-x64.zip
            binary-name: xv.exe
          - os: macos-latest
            target: x86_64-apple-darwin
            archive-name: xv-macos-intel.tar.gz
            binary-name: xv
          - os: macos-latest
            target: aarch64-apple-darwin
            archive-name: xv-macos-apple-silicon.tar.gz
            binary-name: xv
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive-name: xv-linux-x64.tar.gz
            binary-name: xv

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libxcb1-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev libxkbcommon-dev libssl-dev pkg-config

      - name: Install minisign (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          curl -fsSLo minisign.tar.gz https://github.com/jedisct1/minisign/releases/download/0.11/minisign-0.11-linux.tar.gz
          echo "f0a0954413df8531befed169e447a66da6868d79052ed7e892e50a4291af7ae0  minisign.tar.gz" | sha256sum --check --strict
          tar xzf minisign.tar.gz
          sudo cp -f minisign-linux/x86_64/minisign /usr/local/bin/

      - name: Install minisign (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          curl -fsSLo minisign.zip https://github.com/jedisct1/minisign/releases/download/0.11/minisign-0.11-macos.zip
          echo "e7c410ae8b8960d7087392472b040bda9b2f307c76df0384ac37f9ad103fc893  minisign.zip" | shasum -a 256 --check
          unzip -j minisign.zip '*/minisign' -d minisign-bin
          chmod +x minisign-bin/minisign
          echo "MINISIGN_BIN=./minisign-bin/minisign" >> "$GITHUB_ENV"

      - name: Install minisign (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          curl -fsSLO https://github.com/jedisct1/minisign/releases/download/0.11/minisign-0.11-win64.zip
          echo "b9c31c2c3034f81f0e5f5d92cbcc20e67a9671b6e5455661588638848dc58031  minisign-0.11-win64.zip" | sha256sum --check --strict
          unzip -j minisign-0.11-win64.zip -d minisign-bin
          echo "MINISIGN_BIN=./minisign-bin/minisign.exe" >> "$GITHUB_ENV"

      - name: Build release binary
        # Distribution binaries ship ALL backends and UIs: tui (read-only
        # terminal UI) + ui (embedded web UI) + aws (Secrets Manager /
        # CloudTrail / S3). These are feature-gated deps kept off the
        # default `cargo build` for lean source builds, but release
        # artifacts are batteries-included so a downloaded `xv` supports
        # `--backend aws` and `xv ui` out of the box.
        run: cargo build --release --features tui,ui,aws --target ${{ matrix.target }}

      - name: Create archive (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          mkdir release
          copy target\${{ matrix.target }}\release\${{ matrix.binary-name }} release\
          copy README.md release\ 2>nul || echo "README.md not found"
          cd release
          7z a ..\${{ matrix.archive-name }} *

      - name: Create archive (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          mkdir release
          cp target/${{ matrix.target }}/release/${{ matrix.binary-name }} release/
          cp README.md release/ 2>/dev/null || echo "README.md not found"
          cd release
          if [[ "${{ matrix.archive-name }}" == *.tar.gz ]]; then
            tar czf ../${{ matrix.archive-name }} *
          else
            zip -r ../${{ matrix.archive-name }} *
          fi

      - name: Generate checksums
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            certutil -hashfile ${{ matrix.archive-name }} SHA256 | grep -v "hash" | grep -v "CertUtil" | tr -d '\r\n ' > ${{ matrix.archive-name }}.sha256
          else
            shasum -a 256 ${{ matrix.archive-name }} | cut -d ' ' -f 1 > ${{ matrix.archive-name }}.sha256
          fi

      # Signing must run on EVERY platform: `xv upgrade` (>= v0.11.1) refuses
      # to install a release asset that has no .minisig, so an unsigned
      # Windows archive would strand Windows users on their current version.
      - name: Sign release archive
        shell: bash
        run: |
          echo "$MINISIGN_SECRET_KEY" > minisign.key
          "${MINISIGN_BIN:-minisign}" -Sm ${{ matrix.archive-name }} -s minisign.key -t "crosstache ${{ github.ref_name }}"
          rm -f minisign.key
        env:
          MINISIGN_SECRET_KEY: ${{ secrets.MINISIGN_SECRET_KEY }}

      - name: Upload Release Assets
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: |
            ${{ matrix.archive-name }}
            ${{ matrix.archive-name }}.sha256
            ${{ matrix.archive-name }}.minisig
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
